# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Verify SDK release

on: 
  pull_request:
  push:
    branches:
    - main
    - github_actions_build
    - github_actions_build_test
    tags:
      - 'v*'

jobs:    
  build_and_deploy:
    name: Build and deploy
    runs-on: macos-11

    steps:
      - name: Git checkout
        uses: actions/checkout@v2
      - name: layout check
        run: |
          pwd
          ls

      - name: Checkout tools repo
        uses: actions/checkout@v2
        with:
          repository: apple/swift-docc
          path: swift-docc
      - name: layout check
        run: |
          pwd
          ls