# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Verify SDK release

on: 
  pull_request:
  push:
    branches:
    - main
    - github_actions_build
    tags:
      - 'v*'

jobs:    
  build_and_deploy:
    name: Build and deploy
    runs-on: macos-11

    steps:
      - name: Code checkout
        uses: actions/checkout@v2
      - name: Build
        use: mxcl/xcodebuild@v1